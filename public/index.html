<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body>

  <main class="main-content">
    <h1>What's on your mind?</h1>

    <section class="task-panel" id="taskPanel">
      <h2>Add a new task</h2>

      <label for="taskName">Task name</label>
      <input id="taskName" type="text" placeholder="e.g. Book holiday">

      <label for="taskDescription">Description</label>
      <textarea id="taskDescription" placeholder="Add more details..."></textarea>

      <button id="saveTaskButton" class="task-button">Add To List</button>
    </section>

    <section class="widget">
      <h2>ToDo List</h2>
      <p>What's next on your list?</p>

      <ul id="taskList">

      </ul>

    </section>
    
</main>

  <button id="toggleButton" class="circle-button">+</button>

  <script src="./assets/js/script.js"></script>
</body>
</html>
